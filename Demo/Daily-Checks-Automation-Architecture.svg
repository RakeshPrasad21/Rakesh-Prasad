<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <!-- Define gradients and styles -->
    <linearGradient id="sentinelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005A9E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logicAppGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0072C6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00457C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="storageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7FBA00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5A8600;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="powerShellGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#012456;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001533;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyberArkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E81123;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B00012;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1400" height="900" fill="#F5F5F5"/>
  
  <!-- Title -->
  <text x="700" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#333">
    Daily Checks Automation Architecture
  </text>
  
  <!-- Phase Labels -->
  <text x="100" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#666">
    PHASE 1: Data Collection
  </text>
  <text x="750" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#666">
    PHASE 2: Orchestration
  </text>
  <text x="100" y="480" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#666">
    PHASE 3: Analysis &amp; Reporting
  </text>
  
  <!-- Microsoft Sentinel Section -->
  <g filter="url(#shadow)">
    <rect x="50" y="120" width="280" height="320" rx="8" fill="url(#sentinelGrad)" stroke="#0078D4" stroke-width="2"/>
    <image x="70" y="135" width="40" height="40" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cpath fill='%23FFF' d='M24 4L4 14v10c0 14 4.8 22 20 26 15.2-4 20-12 20-26V14L24 4z'/%3E%3C/svg%3E"/>
    <text x="120" y="160" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFF">
      Microsoft Sentinel
    </text>
    
    <!-- Daily Checks -->
    <rect x="70" y="190" width="240" height="60" rx="4" fill="#FFFFFF" opacity="0.95"/>
    <text x="190" y="210" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#0078D4">
      KQL Functions (Daily)
    </text>
    <text x="190" y="230" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">
      20-25 Security Checks
    </text>
    
    <!-- Weekly Checks -->
    <rect x="70" y="265" width="240" height="50" rx="4" fill="#FFFFFF" opacity="0.95"/>
    <text x="190" y="285" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#0078D4">
      KQL Functions (Weekly)
    </text>
    <text x="190" y="302" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">
      Additional Checks
    </text>
    
    <!-- Watchlist -->
    <rect x="70" y="330" width="240" height="90" rx="4" fill="#FFFFFF" opacity="0.95"/>
    <text x="190" y="350" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#0078D4">
      Watchlist
    </text>
    <text x="190" y="370" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">
      • Check Names
    </text>
    <text x="190" y="387" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">
      • Function References
    </text>
    <text x="190" y="404" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">
      • Execution Parameters
    </text>
  </g>
  
  <!-- Logic App Orchestrator -->
  <g filter="url(#shadow)">
    <rect x="420" y="120" width="280" height="250" rx="8" fill="url(#logicAppGrad)" stroke="#0072C6" stroke-width="2"/>
    <image x="440" y="135" width="40" height="40" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cpath fill='%23FFF' d='M24 6L6 16v12l18 10 18-10V16L24 6zm0 4l14 7.8v9.4L24 35l-14-7.8v-9.4L24 10z'/%3E%3C/svg%3E"/>
    <text x="490" y="160" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFF">
      Logic App (Daily)
    </text>
    
    <rect x="440" y="190" width="240" height="160" rx="4" fill="#FFFFFF" opacity="0.95"/>
    <text x="560" y="210" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#0072C6">
      Execution Workflow
    </text>
    
    <circle cx="455" cy="235" r="4" fill="#0072C6"/>
    <text x="465" y="239" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">
      Read Watchlist
    </text>
    
    <circle cx="455" cy="260" r="4" fill="#0072C6"/>
    <text x="465" y="264" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">
      Iterate through checks
    </text>
    
    <circle cx="455" cy="285" r="4" fill="#0072C6"/>
    <text x="465" y="289" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">
      Execute KQL with user access
    </text>
    
    <circle cx="455" cy="310" r="4" fill="#0072C6"/>
    <text x="465" y="314" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">
      Generate CSV output
    </text>
    
    <circle cx="455" cy="335" r="4" fill="#0072C6"/>
    <text x="465" y="339" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">
      Send email &amp; store files
    </text>
  </g>
  
  <!-- Email Output -->
  <g filter="url(#shadow)">
    <rect x="790" y="120" width="240" height="100" rx="8" fill="#FFFFFF" stroke="#666" stroke-width="2"/>
    <path d="M800 135 L900 135 L850 170 Z" fill="#0078D4"/>
    <rect x="800" y="135" width="100" height="70" fill="none" stroke="#0078D4" stroke-width="2"/>
    <text x="910" y="160" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">
      Email Output
    </text>
    <text x="910" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#666">
      Daily Report
    </text>
    <text x="910" y="195" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#666">
      CSV Attached
    </text>
  </g>
  
  <!-- Storage Account -->
  <g filter="url(#shadow)">
    <rect x="790" y="250" width="240" height="120" rx="8" fill="url(#storageGrad)" stroke="#7FBA00" stroke-width="2"/>
    <image x="810" y="265" width="35" height="35" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect x='8' y='10' width='32' height='8' fill='%23FFF' rx='2'/%3E%3Crect x='8' y='22' width='32' height='8' fill='%23FFF' rx='2'/%3E%3Crect x='8' y='34' width='32' height='8' fill='%23FFF' rx='2'/%3E%3C/svg%3E"/>
    <text x="855" y="285" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFF">
      CSV Storage
    </text>
    <text x="910" y="315" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#FFF">
      Folder Structure:
    </text>
    <text x="910" y="333" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle" fill="#FFF">
      /YYYY/MM/DD/check_name.csv
    </text>
    <text x="910" y="350" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle" fill="#FFF">
      Daily CSV Files
    </text>
  </g>
  
  <!-- CyberArk Section -->
  <g filter="url(#shadow)">
    <rect x="420" y="520" width="280" height="140" rx="8" fill="url(#cyberArkGrad)" stroke="#E81123" stroke-width="2"/>
    <image x="440" y="535" width="40" height="40" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cpath fill='%23FFF' d='M24 4L4 14v10c0 10 6 18 20 22 14-4 20-12 20-22V14L24 4zm0 6l16 8v8c0 8-4 14-16 18-12-4-16-10-16-18v-8l16-8z'/%3E%3Cpath fill='%23FFF' d='M24 16c-4 0-7 3-7 7s3 7 7 7 7-3 7-7-3-7-7-7zm0 10c-1.7 0-3-1.3-3-3s1.3-3 3-3 3 1.3 3 3-1.3 3-3 3z'/%3E%3C/svg%3E"/>
    <text x="490" y="560" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFF">
      CyberArk
    </text>
    
    <rect x="440" y="590" width="240" height="50" rx="4" fill="#FFFFFF" opacity="0.95"/>
    <text x="560" y="610" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#E81123">
      Daily Report Download
    </text>
    <text x="560" y="627" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">
      Manual download by SecOps
    </text>
  </g>
  
  <!-- PowerShell Analysis -->
  <g filter="url(#shadow)">
    <rect x="790" y="520" width="280" height="160" rx="8" fill="url(#powerShellGrad)" stroke="#012456" stroke-width="2"/>
    <image x="810" y="535" width="40" height="40" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cpath fill='%2361DAFB' d='M6 6h36v36H6z'/%3E%3Cpath fill='%23FFF' d='M12 16l8 8-8 8M22 30h12'/%3E%3C/svg%3E"/>
    <text x="860" y="560" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFF">
      PowerShell Script
    </text>
    
    <rect x="810" y="590" width="240" height="70" rx="4" fill="#FFFFFF" opacity="0.95"/>
    <text x="930" y="610" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#012456">
      Data Comparison
    </text>
    <text x="930" y="630" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">
      Sentinel Checks vs CyberArk
    </text>
    <text x="930" y="647" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">
      Correlation &amp; Gap Analysis
    </text>
  </g>
  
  <!-- Excel Output -->
  <g filter="url(#shadow)">
    <rect x="790" y="720" width="280" height="100" rx="8" fill="#217346" stroke="#185C37" stroke-width="2"/>
    <image x="810" y="735" width="40" height="40" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect x='8' y='8' width='32' height='32' fill='%23FFF' rx='2'/%3E%3Cpath fill='%23217346' d='M12 12h24v6H12zM12 21h11v3H12zM12 27h11v3H12zM12 33h11v3H12zM26 21h10v3H26zM26 27h10v3H26zM26 33h10v3H26z'/%3E%3C/svg%3E"/>
    <text x="860" y="760" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFF">
      Excel Report
    </text>
    <text x="930" y="790" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#FFF">
      Final Comparison Results
    </text>
    <text x="930" y="807" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#FFF">
      Discrepancies &amp; Insights
    </text>
  </g>
  
  <!-- SecOps User -->
  <g filter="url(#shadow)">
    <circle cx="190" cy="720" r="50" fill="#505050" stroke="#333" stroke-width="2"/>
    <circle cx="190" cy="710" r="15" fill="#FFF"/>
    <path d="M165 745 Q190 725 215 745" fill="#FFF" stroke="#FFF" stroke-width="2"/>
    <text x="190" y="810" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#333">
      SecOps Team
    </text>
  </g>
  
  <!-- Arrows and Flow -->
  <!-- Sentinel to Logic App -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0078D4" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#E81123" />
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#7FBA00" />
    </marker>
    <marker id="arrowhead-dark" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#012456" />
    </marker>
  </defs>
  
  <path d="M 330 220 L 420 220" stroke="#0078D4" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="375" y="215" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0078D4" font-weight="600">
    Trigger
  </text>
  
  <path d="M 330 360 L 380 360 L 380 280 L 420 280" stroke="#0078D4" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="355" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0078D4" font-weight="600">
    Check List
  </text>
  
  <!-- Logic App to Email -->
  <path d="M 700 170 L 790 170" stroke="#0078D4" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="745" y="165" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0078D4" font-weight="600">
    Send
  </text>
  
  <!-- Logic App to Storage -->
  <path d="M 700 280 L 745 280 L 745 310 L 790 310" stroke="#7FBA00" stroke-width="3" fill="none" marker-end="url(#arrowhead-green)"/>
  <text x="720" y="295" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#7FBA00" font-weight="600">
    Store CSV
  </text>
  
  <!-- Storage to PowerShell -->
  <path d="M 910 370 L 910 520" stroke="#7FBA00" stroke-width="3" fill="none" marker-end="url(#arrowhead-green)"/>
  <text x="915" y="450" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#7FBA00" font-weight="600">
    Read CSVs
  </text>
  
  <!-- CyberArk to PowerShell -->
  <path d="M 700 590 L 790 590" stroke="#E81123" stroke-width="3" fill="none" marker-end="url(#arrowhead-red)"/>
  <text x="745" y="585" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#E81123" font-weight="600">
    Input
  </text>
  
  <!-- PowerShell to Excel -->
  <path d="M 930 680 L 930 720" stroke="#012456" stroke-width="3" fill="none" marker-end="url(#arrowhead-dark)"/>
  <text x="935" y="705" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#012456" font-weight="600">
    Generate
  </text>
  
  <!-- SecOps to CyberArk -->
  <path d="M 240 720 L 360 720 L 360 590 L 420 590" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="280" y="705" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#666" font-weight="600">
    Manual Download
  </text>
  
  <!-- SecOps to PowerShell -->
  <path d="M 240 720 L 360 720 L 360 640 L 790 640" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="450" y="655" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#666" font-weight="600">
    Execute Script
  </text>
  
  <!-- SecOps to Excel -->
  <path d="M 240 755 L 620 755 L 620 770 L 790 770" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="500" y="745" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#666" font-weight="600">
    Review Report
  </text>
  
  <!-- Schedule Indicator -->
  <g filter="url(#shadow)">
    <rect x="1120" y="120" width="220" height="250" rx="8" fill="#FFF" stroke="#666" stroke-width="2"/>
    <text x="1230" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">
      Schedule
    </text>
    
    <circle cx="1145" cy="180" r="3" fill="#0078D4"/>
    <text x="1155" y="184" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">
      Logic App: Daily
    </text>
    
    <circle cx="1145" cy="205" r="3" fill="#0078D4"/>
    <text x="1155" y="209" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">
      KQL Checks: Daily
    </text>
    
    <circle cx="1145" cy="230" r="3" fill="#7FBA00"/>
    <text x="1155" y="234" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">
      Weekly Checks: Weekly
    </text>
    
    <circle cx="1145" cy="255" r="3" fill="#E81123"/>
    <text x="1155" y="259" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">
      CyberArk: Manual Daily
    </text>
    
    <circle cx="1145" cy="280" r="3" fill="#012456"/>
    <text x="1155" y="284" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">
      PowerShell: On-Demand
    </text>
    
    <rect x="1135" y="300" width="170" height="50" rx="4" fill="#F0F0F0" stroke="#0078D4" stroke-width="1"/>
    <text x="1220" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#0078D4">
      Automation Goal
    </text>
    <text x="1220" y="337" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">
      Full end-to-end automation
    </text>
  </g>
  
  <!-- Legend -->
  <g>
    <text x="70" y="870" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">
      Legend:
    </text>
    <line x1="130" y1="865" x2="180" y2="865" stroke="#0078D4" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="185" y="870" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#666">
      Automated Flow
    </text>
    
    <line x1="290" y1="865" x2="340" y2="865" stroke="#666" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="345" y="870" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#666">
      Manual Process
    </text>
    
    <line x1="450" y1="865" x2="500" y2="865" stroke="#7FBA00" stroke-width="3" marker-end="url(#arrowhead-green)"/>
    <text x="505" y="870" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#666">
      Data Storage
    </text>
  </g>
</svg>